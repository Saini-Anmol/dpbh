name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS model/wasm assets)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Verify model is in sync
        run: npm run sync-model:check

      - name: Build extension package
        run: npm run package

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: digicom-extension
          path: dist/digicom-extension.zip
          if-no-files-found: error
